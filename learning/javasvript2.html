<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Javascript</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
   
    <div class="d-flex">
        <input type="number" id="inputAge" class="form-control" placeholder="Enter Age">
        <button onclick="checkAge();" class="btn btn-warning">Check Age</button>
    </div>

    <div id="msg"></div>


    <div class="d-flex mt-4">
        <input class="form-control" type="password" id="inputPass" placeholder="Enter Password">
        <button onclick="showPassword();" class="btn btn-primary"><i id="iconPass" class="bi bi-eye-fill"></i></button>
    </div>

    
    <div class="container">
        <div id="productRow" class="row"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script>

        checkData();

        function checkData(){
            var products = ['Burger' , 'Pizza' , 'Pasta' , 'Latte' , 'Sushi' , 'Fries' , 'Biryani'];

            var productRow = document.getElementById('productRow');

            var productData = "";

            for(var i=0; i < products.length; i++){

                

                productData += `
                <div class="col-lg-3 col-md-4 col-sm-6 col-12">
                    <div class="card shadow">
                        <div class="card-body">${products[i]}</div>
                    </div>
                </div>`;

            }

            productRow.innerHTML = productData;
        }

        function showPassword(){

            var inputPass = document.getElementById('inputPass');
            var icon = document.getElementById('iconPass');

            if(inputPass.type == "password"){
                inputPass.type = 'text';

                icon.classList.remove('bi-eye-fill');
                icon.classList.add('bi-eye-slash-fill');


            }else{
                inputPass.type = 'password';

                icon.classList.add('bi-eye-fill');
                icon.classList.remove('bi-eye-slash-fill');
            }

        }

        function checkAge (){

            var age = document.getElementById('inputAge').value;

            var msg = document.getElementById('msg');

            var oldText = "You are Old !";

            if( age > 40){

                msg.innerHTML = `<div class='alert alert-danger'>${oldText}</div>`;
            }else{
                msg.innerHTML = "<div class='alert alert-success'>You are Young !</div>";

            }

        }
        
        
    </script>
  </body>
</html>
